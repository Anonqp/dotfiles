# ==================================================================================
#  YAZI.TOML - ULTRAKILL EDITION (Full Syntax Verified)
#  Optimized for WezTerm, WSL2, and Neovim
# ==================================================================================
"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 1, 3, 4 ]
sort_by        = "mtime"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1500
max_height      = 1500
cache_dir       = ""
image_filter    = "lanczos3"
image_quality   = 90
image_delay     = 30
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
# 1. Neovim (Primary Text Editor)
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim", for = "unix" }
]

# 2. Standard Openers (Linux/WSL)
open = [
    { run = 'xdg-open "$@"', desc = "Open", for = "linux" }
]

# 3. Media Player
play = [
    { run = 'xdg-open "$@"', desc = "Play", for = "linux" }
]

# 4. Reveal in Explorer (WSL Support)
reveal = [
    { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", for = "linux" }
]

# 5. Archive Extraction
extract = [
    { run = 'ya pub extract --list "$@"', desc = "Extract here" }
]

# 6. Download Handling
download = [
    { run = 'ya emit download --open "$@"', desc = "Download and open" },
    { run = 'ya emit download "$@"',        desc = "Download" }
]

[open]
rules = [
    # --- Special User Rules (Force Neovim) ---
    { name = "*.txt",  use = "edit" },
    { name = "*.md",   use = "edit" },
    { name = "*.lua",  use = "edit" },
    { name = "*.cpp",  use = "edit" },
    { name = "*.py",   use = "edit" },
    { name = "*.rs",   use = "edit" },
    { name = "*.toml", use = "edit" },
    { name = "*.json", use = "edit" },
    { name = "README", use = "edit" },
    { name = "LICENSE", use = "edit" },

    # --- Standard File Types ---
    # Folder
    { url = "*/", use = [ "open", "reveal" ] },
    # Media
    { mime = "{audio,video}/*", use = [ "play", "reveal" ] },
    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
    # Fallback
    { url = "*", use = [ "open", "reveal" ] }
]

[tasks]
micro_workers    = 10
macro_workers    = 10
bizarre_retry    = 3
image_alloc      = 536870912  # 512MB
image_bound      = [ 10000, 10000 ]
suppress_preload = false

[plugin]
fetchers = [
    { id = "mime", url = "*/",          run = "mime.dir",    prio = "high" },
    { id = "mime", url = "local://*",   run = "mime.local",  prio = "high" },
    { id = "mime", url = "remote://*",  run = "mime.remote", prio = "high" }
]
spotters = [
    { url = "*/", run = "folder" },
    { mime = "text/*", run = "code" },
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "vfs/*", run = "vfs" },
    { mime = "null/*", run = "null" },
    { url = "*", run = "file" }
]
preloaders = [
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "application/pdf", run = "pdf" },
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" }
]
previewers = [
    { url = "*/", run = "folder" },
    { mime = "text/*", run = "code" },
    { mime = "application/{json,ndjson}", run = "json" },
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "application/pdf", run = "pdf" },
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
    { mime = "inode/empty", run = "empty" },
    { url = "*", run = "file" }
]

[input]
cursor_blink = false
# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]
# create
create_title  = [ "Create:", "Create (dir):" ]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]
# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]
# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]
# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]
# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]
# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title     = "Trash {n} selected file{s}?"
trash_origin    = "center"
trash_offset    = [ 0, 0, 70, 20 ]
# delete
delete_title    = "Permanently delete {n} selected file{s}?"
delete_origin   = "center"
delete_offset   = [ 0, 0, 70, 20 ]
# overwrite
overwrite_title  = "Overwrite file?"
overwrite_body   = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 50, 15 ]
# quit
quit_title  = "Quit?"
quit_body   = "There are unfinished tasks, quit anyway?\n(Open task manager with default key 'w')"
quit_origin = "center"
quit_offset = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false
